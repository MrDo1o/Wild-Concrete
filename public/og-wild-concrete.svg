  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcfaf7" />
      <stop offset="55%" stop-color="#efe9df" />
      <stop offset="100%" stop-color="#ece8f3" />
